name: Generate Mapd Russia Tiles

on:
  schedule:
    # Every Sunday at 3:00 UTC
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force generation even if sources unchanged'
        required: false
        default: 'false'

env:
  GO_VERSION: '1.25'

jobs:
  generate-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max
    permissions:
      contents: write  # Required for creating releases

    steps:
      # ============================================
      # Step 1: Checkout
      # ============================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      # ============================================
      # Step 2: Setup Go
      # ============================================
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # ============================================
      # Step 3: Install dependencies
      # ============================================
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            capnproto \
            wget \
            curl \
            jq \
            python3 \
            python3-pip
          pip3 install requests

      # ============================================
      # Step 4: Install capnpc-go and generate capnp Go code
      # ============================================
      - name: Install capnpc-go
        run: |
          go install capnproto.org/go/capnp/v3/capnpc-go@v3.1.0-alpha.1
          git clone -b v3.1.0-alpha.1 https://github.com/capnproto/go-capnp /tmp/go-capnp
          echo "capnpc-go installed"

      - name: Generate capnp code
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          export GO_CAPNP_PATH=/tmp/go-capnp/std
          # Force regenerate by removing old .capnp.go files
          rm -f cereal/offline/offline.capnp.go cereal/custom/custom.capnp.go
          make capnp
          # Verify new types exist
          grep -q "type Camera struct" cereal/offline/offline.capnp.go && echo "Camera OK"
          grep -q "type CameraInfo struct" cereal/custom/custom.capnp.go && echo "CameraInfo OK"
          echo "capnp generation done"

      # ============================================
      # Step 5: Tidy and verify Go modules
      # ============================================
      - name: Go mod tidy
        run: |
          export CGO_ENABLED=1
          go mod tidy

      # ============================================
      # Step 6: Build mapd binary (ARM64 for Comma)
      # ============================================
      - name: Build mapd binary
        run: |
          export CGO_ENABLED=1
          # Build native (for tile generation)
          go build -v -o mapd-native .
          echo "MAPD_NATIVE=$(pwd)/mapd-native" >> $GITHUB_ENV
          ./mapd-native version || true
          # Build ARM64 for sunnypilot (cross-compile with cgo)
          sudo apt-get install -y gcc-aarch64-linux-gnu
          CC=aarch64-linux-gnu-gcc GOOS=linux GOARCH=arm64 CGO_ENABLED=1 go build -ldflags="-s -w" -v -o mapd-linux-arm64 .
          echo "MAPD_ARM64=$(pwd)/mapd-linux-arm64" >> $GITHUB_ENV

      # ============================================
      # Step 6: Download OSM Russia PBF
      # ============================================
      - name: Download OSM Russia PBF
        run: |
          echo "Downloading russia-latest.osm.pbf..."
          wget -q --show-progress \
            -O /tmp/russia.osm.pbf \
            "https://download.geofabrik.de/russia-latest.osm.pbf"
          du -h /tmp/russia.osm.pbf
          echo "OSM_PBF=/tmp/russia.osm.pbf" >> $GITHUB_ENV

      # ============================================
      # Step 7: Download speedcam database
      # ============================================
      - name: Download speedcam database
        run: |
          echo "Downloading Rus.radar.txt..."
          wget -q --show-progress \
            -O /tmp/Rus.radar.txt \
            "https://speedcamonline.ru/map/Rus/Rus.radar.txt"
          CAMERAS=$(wc -l < /tmp/Rus.radar.txt)
          echo "Camera DB lines: $CAMERAS"
          echo "CAMERA_DB=/tmp/Rus.radar.txt" >> $GITHUB_ENV

      # ============================================
      # Step 8: Generate tiles
      # ============================================
      - name: Generate tiles
        run: |
          mkdir -p /tmp/tiles
          echo "Generating tiles..."
          go run cmd/generate.go \
            --osm "$OSM_PBF" \
            --cameras "$CAMERA_DB" \
            --out /tmp/tiles
          echo "Tiles generated:"
          find /tmp/tiles/offline -name "*.tar.gz" | wc -l

      # ============================================
      # Step 9: Create manifest.json
      # ============================================
      - name: Generate manifest
        run: |
          VERSION="v$(date +%Y.%m.%d)-rus"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          python3 << 'PYEOF'
          import hashlib
          import json
          import os
          from pathlib import Path

          tiles_dir = Path("/tmp/tiles/offline")
          manifest = {
              "version": os.environ.get("VERSION", "unknown"),
              "generation": int(__import__("time").time()),
              "tiles": {},
              "coverage": {
                  "minLat": 41.0,
                  "minLon": 19.0,
                  "maxLat": 82.0,
                  "maxLon": 169.0,
              },
          }

          for tile_file in sorted(tiles_dir.rglob("*.tar.gz")):
              rel = tile_file.relative_to(Path("/tmp/tiles")).as_posix()
              h = hashlib.sha256()
              with open(tile_file, "rb") as f:
                  for chunk in iter(lambda: f.read(65536), b""):
                      h.update(chunk)
              manifest["tiles"][rel] = {
                  "hash": h.hexdigest(),
                  "size": tile_file.stat().st_size,
              }

          with open("/tmp/tiles/manifest.json", "w") as f:
              json.dump(manifest, f, indent=2)

          total_size = sum(t["size"] for t in manifest["tiles"].values())
          print(f"Manifest: {len(manifest['tiles'])} tiles, {total_size / 1024 / 1024:.1f} MB total")
          PYEOF

      # ============================================
      # Step 10: Create release archive
      # ============================================
      - name: Create release archive
        run: |
          cd /tmp/tiles
          tar -czf /tmp/mapd-russia-tiles.tar.gz offline/ manifest.json
          du -h /tmp/mapd-russia-tiles.tar.gz
          echo "RELEASE_ARCHIVE=/tmp/mapd-russia-tiles.tar.gz" >> $GITHUB_ENV

      # ============================================
      # Step 11: Create GitHub Release
      # ============================================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Mapd Russia Tiles — ${{ env.VERSION }}"
          body: |
            ## 🗺️ Mapd Russia Tiles — ${{ env.VERSION }}

            Автоматически сгенерированные тайлы карт РФ с камерами.

            ### 📦 Состав релиза
            - `mapd-russia-tiles.tar.gz` — все тайлы + manifest.json
            - Покрытие: РФ (41°–82° с.ш., 19°–169° в.д.)

            ### 📡 Источники данных
            - OSM: [Geofabrik Russia](https://download.geofabrik.de/russia.html)
            - Камеры: [speedcamonline.ru](https://speedcamonline.ru)

            ### 🔧 Использование в sunnypilot
            ```bash
            # Скачать и распаковать
            wget https://github.com/${{ github.repository }}/releases/download/${{ env.VERSION }}/mapd-russia-tiles.tar.gz
            tar -xzf mapd-russia-tiles.tar.gz -C /data/mapd/
            ```
          files: |
            /tmp/mapd-russia-tiles.tar.gz
            /tmp/tiles/manifest.json
            ${{ env.MAPD_ARM64 }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
